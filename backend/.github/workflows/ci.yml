name: CI

on:
  push:
    branches: ["main", "dev", "feature/**"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: binance_auto_trader_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
      redis:
        image: redis:7
        ports: ["6379:6379"]
    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/binance_auto_trader_test
      TEST_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/binance_auto_trader_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      BINANCE_FUTURES_BASE_URL: https://fapi.binance.com
      BINANCE_FUTURES_TESTNET_BASE_URL: https://testnet.binancefuture.com
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef=
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - run: python -m compileall app
      - run: alembic upgrade head
      - run: pytest -q tests/unit
