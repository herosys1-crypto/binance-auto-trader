services:
  db:
    image: postgres:16
    container_name: binance-auto-trader-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: binance_auto_trader
      POSTGRES_USER: postgres
      # .env 의 POSTGRES_PASSWORD 를 주입. 미설정 시 'postgres' 기본값 (testnet 호환).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      # 보안: 127.0.0.1 로 바인딩해서 외부 네트워크에서 접근 불가.
      # 호스트 5433 → 컨테이너 5432. 컨테이너끼리는 항상 5432 사용.
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: binance-auto-trader-redis
    restart: unless-stopped
    ports:
      # 호스트 6380 → 컨테이너 6379 (호스트 충돌 방지용). 컨테이너끼리는 항상 6379 사용.
      - "6380:6379"

  api:
    build: .
    container_name: binance-auto-trader-api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  scheduler:
    build: .
    container_name: binance-auto-trader-scheduler
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: ["python", "-m", "app.workers.scheduler_runner"]
    volumes:
      - .:/app

  user-stream:
    build: .
    container_name: binance-auto-trader-user-stream
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: ["python", "-m", "app.workers.run_user_stream"]
    volumes:
      - .:/app

  # 2026-05-20: markPrice 실시간 스트림 — Redis 캐시 갱신 (1초 주기) 후 API 가
  # 라이브 PNL 재계산에 사용. UBUSDT 사례에서 reconcile 2분 stale 로 13 USDT
  # 차이 발생 → 본 서비스로 ±0.1 USDT 이내 일치.
  mark-price-stream:
    build: .
    container_name: binance-auto-trader-mark-price-stream
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: ["python", "-m", "app.workers.mark_price_stream_consumer"]
    volumes:
      - .:/app

  prometheus:
    image: prom/prometheus:latest
    container_name: binance-auto-trader-prometheus
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./deploy/prometheus/alerts-binance-auto-trader.yml:/etc/prometheus/alerts-binance-auto-trader.yml
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: binance-auto-trader-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: Admin1234!
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

  # PostgreSQL 자동 백업 (일/주/월 보관)
  # - 매일 03:00 (UTC) 실행 → 호스트 ./db_backups 폴더에 저장
  # - 일별 7개, 주별 4개, 월별 6개 보관
  # - 복원: docker compose run --rm db psql -U postgres -d binance_auto_trader < db_backups/last/binance_auto_trader-YYYYMMDD.sql.gz (gunzip 필요)
  db-backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: binance-auto-trader-db-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: binance_auto_trader
      POSTGRES_USER: postgres
      # db 와 동일한 비번 변수 사용
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_EXTRA_OPTS: "-Z6 --schema=public --blobs"
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
    volumes:
      - ./db_backups:/backups
    depends_on:
      - db

volumes:
  postgres_data:
